<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Premium - Acesso</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="login-container">
        
        <div class="login-box" id="loginBox">
            <div class="logo">
                <span class="material-symbols-outlined icon-logo">content_cut</span>
                <h2>BARBER<span>SHOP</span></h2>
                <p>Seja bem-vindo de volta!</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">mail</span>
                    <input type="email" id="loginEmail" required placeholder=" ">
                    <label for="loginEmail">E-mail</label>
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">lock</span>
                    <input type="password" id="loginPassword" required placeholder=" ">
                    <label for="loginPassword">Senha</label>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox"> Manter conectado
                    </label>
                    <a href="#" class="forgot-pass">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="register-link">
                <p>Não tem uma conta? <a href="#" id="linkIrParaCadastro">Cadastre-se aqui</a></p>
            </div>
        </div>

        <div class="login-box hide" id="cadastroBox">
            <div class="logo">
                <span class="material-symbols-outlined icon-logo">content_cut</span>
                <h2>CRIE SUA <span>CONTA</span></h2>
                <p>Entre para o clube dos cavalheiros</p>
            </div>

            <form id="cadastroForm">
                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">person</span>
                    <input type="text" id="cadNome" required placeholder=" ">
                    <label for="cadNome">Nome Completo</label>
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">phone</span>
                    <input type="tel" id="cadTelefone" required placeholder=" ">
                    <label for="cadTelefone">Telefone / WhatsApp</label>
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">mail</span>
                    <input type="email" id="cadEmail" required placeholder=" ">
                    <label for="cadEmail">E-mail</label>
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">lock</span>
                    <input type="password" id="cadSenha" required placeholder=" ">
                    <label for="cadSenha">Senha</label>
                </div>

                <button type="submit" class="btn-login">Finalizar Cadastro</button>
            </form>

            <div class="register-link">
                <p>Já tem uma conta? <a href="#" id="linkIrParaLogin">Faça Login</a></p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
